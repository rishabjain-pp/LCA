version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: lca-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - livekit-network
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: lca-livekit
    command: --dev --config /config/livekit.yaml --node-ip=host.docker.internal
    ports:
      - "7880:7880"
      - "7881:7881/tcp"
      - "7882-7900:7882-7900/udp"
    depends_on:
      - redis
    networks:
      - livekit-network
    restart: unless-stopped
    volumes:
      - ./deploy/livekit.yaml:/config/livekit.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sip:
    image: livekit/sip:latest
    container_name: lca-sip
    depends_on:
      - redis
      - livekit
    ports:
      - "15060:5060/udp"
      - "15060:5060/tcp"
      - "10000-10100:10000-10100/udp"
    environment:
      SIP_CONFIG_BODY: |
        api_key: 'devkey'
        api_secret: 'secret'
        ws_url: 'ws://livekit:7880'
        redis:
          address: 'redis:6379'
        sip_port: 5060
        rtp_port: 10000-10100
        use_external_ip: false
        logging:
          level: debug
    networks:
      - livekit-network
    restart: unless-stopped

networks:
  livekit-network:
    driver: bridge

volumes:
  redis_data:
